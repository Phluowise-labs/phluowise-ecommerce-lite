<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TRV3R43NQZ"></script>

    <title>Phluowise Community - Feature Requests</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#007ACC">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Phluowise">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/tailwind-global.css" />
    <link rel="stylesheet" href="css/mobile-responsive.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #030303;
            --bg-second: rgba(20, 20, 20, 0.95);
            --bg-third: #080808;
            --header-bg: rgba(16, 16, 16, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-glow: rgba(59, 116, 255, 0.4);
            --text-main: #FFFFFF;
            --text-secondary: #9BA1A6;
            --primary: #3B74FF;
            --card-radius: 20px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 10%, rgba(59, 116, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-bar {
            background: var(--header-bg);
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Tab Bar - Extreme Glass */
        .analytics-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 24px;
            gap: 6px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            background: transparent;
            border: 1px solid transparent;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .tab-btn.active {
            background: rgba(59, 116, 255, 0.15);
            color: white;
            border: 1px solid rgba(59, 116, 255, 0.3);
            box-shadow: 0 4px 15px rgba(59, 116, 255, 0.2), inset 0 0 10px rgba(59, 116, 255, 0.1);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        /* Circular Floating Action Buttons (CFAB) - Enhanced Glass */
        .cfab-container {
            position: fixed;
            bottom: 110px;
            right: 30px;
            z-index: 1000;
        }

        .cfab-trigger {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.08); /* More transparent but vibrant */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cfab-trigger:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .cfab-trigger.active {
            transform: rotate(135deg);
            background: var(--primary);
            color: white;
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .cfab-item {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .cfab-container.active .cfab-item {
            opacity: 1;
            pointer-events: auto;
        }

        .cfab-container.active .item-1 { transform: translate(0, -110px); }
        .cfab-container.active .item-2 { transform: translate(-50px, -100px); }
        .cfab-container.active .item-3 { transform: translate(-100px, -50px); }
        .cfab-container.active .item-4 { transform: translate(-110px, 0); }

        .bubble-val { font-size: 14px; font-weight: 700; color: #fff; text-shadow: 0 0 10px var(--primary-glow); }
        .bubble-label { font-size: 8px; text-transform: uppercase; color: var(--text-secondary); }

        /* Voting & Comments - Extreme Glass Buttons */
        .vote-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .vote-action-btn {
            padding: 10px 14px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
        }

        .vote-action-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .vote-action-btn.active.up {
            color: #22C55E;
            background: rgba(34, 197, 94, 0.15);
            box-shadow: inset 0 0 15px rgba(34, 197, 94, 0.1);
        }

        .vote-action-btn.active.down {
            color: #EF4444;
            background: rgba(239, 68, 68, 0.15);
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .vote-count-display {
            padding: 0 12px;
            font-weight: 800;
            font-size: 15px;
            color: var(--text-main);
            min-width: 34px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .comment-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            display: none;
        }

        .comment-section.active { display: block; }

        .comment-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        /* Modern Comment Stats & Actions */
        .comment-stats-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
        }

        .comment-stats-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            display: flex;
            overflow: hidden;
        }

        .comment-stats-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .c-bar-up { background: #22C55E; height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .c-bar-down { background: #EF4444; height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .c-vote-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .c-vote-btn:hover { color: var(--text-main); transform: translateY(-1px); }
        .c-vote-btn.active.up { color: #22C55E; }
        .c-vote-btn.active.down { color: #EF4444; }

        .comment-bubble {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .comment-text {
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .comment-footer {
            display: flex;
            justify-content: flex-end;
        }

        .mini-vote-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 2px 4px;
        }

        .mini-vote-btn {
            padding: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
        }

        .mini-vote-btn:hover { color: var(--text-main); }
        .mini-vote-btn.active.up { color: #22C55E; filter: drop-shadow(0 0 5px rgba(34, 197, 94, 0.3)); }
        .mini-vote-btn.active.down { color: #EF4444; filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.3)); }

        .mini-vote-count {
            padding: 0 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            min-width: 20px;
            text-align: center;
        }

        .comment-input-group {
            display: flex;
            gap: 12px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            backdrop-filter: blur(20px);
        }

        .comment-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .send-comment-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(59, 116, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 116, 255, 0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .send-comment-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .send-comment-btn.loading-active svg {
            animation: rotateSimple 0.6s linear infinite;
        }

        @keyframes rotateSimple {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .comment-updated {
            animation: flashUpdate 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes flashUpdate {
            0% { 
                background: rgba(59, 116, 255, 0.15); 
                border-color: rgba(59, 116, 255, 0.4); 
                box-shadow: 0 0 20px rgba(59, 116, 255, 0.1);
            }
            100% { 
                background: rgba(255, 255, 255, 0.04); 
                border-color: var(--glass-border);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            }
        }

        /* Extreme Glassmorphism Toasts */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .toast {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--primary);
            padding: 14px 20px;
            border-radius: 18px;
            color: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 14px;
            animation: toastSlideDown 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: auto;
            transition: all 0.4s ease;
        }

        .toast-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast-message {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .toast.error { border-left-color: #EF4444; background: rgba(239, 68, 68, 0.1); }
        .toast.success { border-left-color: #22C55E; background: rgba(34, 197, 94, 0.1); }

        @keyframes toastSlideDown {
            from { opacity: 0; transform: translateY(-30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Voting Pulse Statistics */
        .vote-stats-container {
            flex: 1;
            margin: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .vote-stats-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vote-bar-up {
            background: linear-gradient(90deg, #22C55E, #4ade80);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vote-bar-down {
            background: linear-gradient(90deg, #F43F5E, #fb7185);
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.3);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vote-stats-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-icon-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
        }

        /* Search & Filter - Glass Style */
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 16px 14px 48px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .filter-select {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Feature Request Cards */
        .request-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 116, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 20px rgba(59, 116, 255, 0.05);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Action Buttons (Edit/Delete) */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .action-btn.edit:hover {
            background: rgba(59, 116, 255, 0.1);
            color: var(--primary);
            border-color: rgba(59, 116, 255, 0.2);
        }

        /* FAB - Premium Glass FAB */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 2000;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(59, 116, 255, 0.2);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(59, 116, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 30px rgba(59, 116, 255, 0.2);
        }

        .fab:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 0 40px var(--primary-glow);
        }

        .fab-whatsapp {
            bottom: 110px !important;
            background: rgba(37, 211, 102, 0.2) !important;
            border-color: rgba(37, 211, 102, 0.4) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 30px rgba(37, 211, 102, 0.2) !important;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            rotate: 0deg !important;
        }

        .fab-whatsapp:hover {
            background: #25D366 !important;
            transform: scale(1.1) rotate(0deg) !important;
            box-shadow: 0 0 40px rgba(37, 211, 102, 0.5) !important;
        }

        /* FAB Group Styling */
        .fab-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2500;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: none;
            user-select: none;
        }

        .fab-group.dragging {
            transition: none !important;
            cursor: grabbing !important;
        }

        .fab-toggler {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: grab;
            transition: all 0.4s ease;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .fab-toggler:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .fab-group.collapsed .fab, 
        .fab-group.collapsed .cfab-container {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px) scale(0.8);
        }

        .fab-group.collapsed .fab-toggler svg {
            transform: rotate(180deg);
        }

        .fab-group .fab, 
        .fab-group .cfab-container {
            position: static !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Modal / Bottom Sheet */
        .modal-content {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(59, 116, 255, 0.1);
        }

        .form-input-large, .form-textarea-large {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input-large:focus, .form-textarea-large:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .submit-btn {
            background: rgba(59, 116, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 116, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .submit-btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        /* Missing Layout Styles */
        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .controls-row {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        /* Circular Floating Menu (Stats CFAB) */
        .cfab-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2500;
        }

        .cfab-trigger {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .cfab-container.active .cfab-trigger {
            background: var(--primary);
            transform: rotate(45deg);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .cfab-item {
            position: absolute;
            bottom: 5px;
            left: 5px;
            width: 50px;
            height: 50px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        .cfab-container.active .cfab-item {
            opacity: 1;
            pointer-events: auto;
        }

        /* Arc Positioning (Flipped for Right-Side anchoring) */
        .cfab-container.active .item-1 { transform: translate(-15px, -80px); transition-delay: 0.05s; }
        .cfab-container.active .item-2 { transform: translate(-75px, -50px); transition-delay: 0.1s; }
        .cfab-container.active .item-3 { transform: translate(-95px, 15px); transition-delay: 0.15s; }
        .cfab-container.active .item-4 { transform: translate(-75px, 80px); transition-delay: 0.2s; }

        .bubble-val {
            font-size: 13px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        .bubble-label {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            z-index: 10;
        }

        .requests-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 100px;
        }

        @media (min-width: 768px) {
            .requests-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }

        .request-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .request-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
        }

        .request-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Status Colors */
        .status-pending { background: rgba(251, 191, 36, 0.1); color: #FBBF24; border: 1px solid rgba(251, 191, 36, 0.2); }
        .status-in-progress { background: rgba(59, 130, 246, 0.1); color: #60A5FA; border: 1px solid rgba(59, 130, 246, 0.2); }
        .status-completed { background: rgba(34, 197, 94, 0.1); color: #4ADE80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-rejected { background: rgba(239, 68, 68, 0.1); color: #F87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000; /* Higher than FAB */
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* Custom Confirmation Modal */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            padding: 20px;
        }

        .confirm-overlay.active { display: flex; }

        .confirm-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 1), 0 0 50px rgba(239, 68, 68, 0.05);
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .confirm-overlay.active .confirm-card { transform: scale(1); }

        .confirm-icon-box {
            width: 60px;
            height: 60px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #EF4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .confirm-title { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 12px; }
        .confirm-text { color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }

        .confirm-btns { display: flex; gap: 12px; }
        .confirm-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .confirm-btn.cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .confirm-btn.cancel:hover { background: rgba(255, 255, 255, 0.1); }

        .confirm-btn.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fff;
            border: 1px solid rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .confirm-btn.danger:hover {
            background: #EF4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        .modal-content {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(59, 116, 255, 0.1);
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            padding: 30px;
            transform: translateY(20px);
            transition: all 0.3s ease-out;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            color: white;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            border: 1px solid rgba(59, 116, 255, 0.4);
            background: rgba(59, 116, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
        }

        .btn-loading .btn-text { opacity: 0; }
        .btn-loading .spinner { display: block; }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            position: absolute;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header-bar">
        <button onclick="history.back()" class="p-2 mr-4 rounded-full hover:bg-white/10 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h1 class="text-xl font-bold">Phluowise Community</h1>
    </header>

    <main class="container">
        <!-- Dashboard Tabs -->
        <div class="analytics-tabs">
            <div class="tab-btn active" onclick="switchTab('overview')">Overview</div>
            <div class="tab-btn" onclick="switchTab('distribution')">Distribution</div>
            <div class="tab-btn" onclick="switchTab('ranking')">Ranking</div>
        </div>

        <div id="overviewTab" class="tab-content active">
             <!-- Static content removed as requested, now using FAB instead -->
        </div>

        <div id="distributionTab" class="tab-content">
            <div class="glass-card mb-8">
                <h2 class="text-lg font-semibold mb-4">Feature Distribution</h2>
                <div class="chart-container" style="position: relative; height: 250px;">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <div id="rankingTab" class="tab-content">
            <div class="glass-card mb-8">
                <h2 class="text-lg font-semibold mb-4">Top Voted Features</h2>
                <div class="chart-container" style="position: relative; height: 300px;">
                    <canvas id="rankingChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-row">
            <div class="search-box">
                <svg class="search-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" class="search-input" placeholder="Search features..." id="searchInput">
            </div>
            
            <div class="flex gap-4">
                <select class="filter-select" id="statusFilter">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="in-progress">Building</option>
                    <option value="completed">Shipped</option>
                </select>
                
                <select class="filter-select" id="sortFilter">
                    <option value="top">Top Voted</option>
                    <option value="newest">Newest</option>
                </select>
            </div>
        </div>

        <!-- Requests List -->
        <div class="requests-grid" id="requestsContainer">
            <!-- Loading State -->
            <div class="col-span-full py-20 text-center text-secondary">
                <div class="animate-pulse">Fetching community ideas...</div>
            </div>
        </div>
    </main>

    <!-- FAB Navigation Group -->
    <div class="fab-group" id="fabGroup">
        <!-- Master Toggler -->
        <button class="fab-toggler" onclick="toggleFabGroup()" title="Toggle Navigation">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>

        <!-- Circular Floating Stats Menu -->
        <div class="cfab-container" id="statsMenu">
            <div class="cfab-trigger" onclick="toggleStatsMenu()">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
            </div>
            <div class="cfab-item item-1">
                <span class="bubble-val" id="bubbleTotal">0</span>
                <span class="bubble-label">Ideas</span>
            </div>
            <div class="cfab-item item-2">
                <span class="bubble-val" id="bubbleVotes">0</span>
                <span class="bubble-label">Votes</span>
            </div>
            <div class="cfab-item item-3">
                <span class="bubble-val" id="bubbleBuilding">0</span>
                <span class="bubble-label">Bld</span>
            </div>
            <div class="cfab-item item-4">
                <span class="bubble-val" id="bubbleShipped">0</span>
                <span class="bubble-label">Ship</span>
            </div>
        </div>

        <!-- WhatsApp FAB -->
        <a href="https://whatsapp.com/channel/0029VbAXsz3JP215oI0cbS3W" target="_blank" class="fab fab-whatsapp" title="Join WhatsApp Community" style="position: static !important; width: 60px; height: 60px;">
            <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </a>

        <!-- Create FAB -->
        <div class="fab" id="openModalBtn" title="Request a Feature" style="position: static !important; width: 60px; height: 60px;">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-card">
            <div class="confirm-icon-box">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h3 class="confirm-title" id="confirmTitle">Delete Proposal?</h3>
            <p class="confirm-text" id="confirmText">This action cannot be undone. All votes and comments will be lost forever.</p>
            <div class="confirm-btns">
                <button class="confirm-btn cancel" id="confirmCancel">Cancel</button>
                <button class="confirm-btn danger" id="confirmAction">Delete</button>
            </div>
        </div>
    </div>

    <!-- Request Modal -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold text-white">Propose a Feature</h2>
                <button onclick="closeModal()" class="text-secondary hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="featureForm">
                <input type="hidden" id="editRequestId">
                <div class="form-group">
                    <label class="form-label">Feature Title</label>
                    <input type="text" class="form-input-large" id="featureTitle" placeholder="What should we build?" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea-large" id="featureDesc" placeholder="Describe how this feature will help you..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitFeatureBtn">
                    <span id="submitBtnText" class="btn-text">Submit Proposal</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- Details/Comment Overlay (Hidden by default) -->
    <div class="modal-overlay" id="detailsModal">
        <!-- Will be populated dynamically -->
    </div>

    <!-- Appwrite Config & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script src="js/appwriteConfig.js"></script>
    <script src="js/community.js"></script>

    <div id="toastContainer" class="toast-container"></div>
</body>

</html>
