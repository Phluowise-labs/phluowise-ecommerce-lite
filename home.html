    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #060606;
            --bg-second: #1D1D1DF2;
            --bg-third: #101010;
            --header-bg: #101010;
            --tab-bg: #101010;
            --input-field-second: #40444B66;
            --input-field-second-border: #808080;
            --btn-color: #007ACC66;
            --btn-border: #3B74FF;
            --btn-second-color: #F57D7D4D;
            --btn-second-border: #F57D7D;
            --modal-bg: #101010;
            --modal-border: #DADADA;
            --text-color: #FFFFFF;
            --text-muted: #A0AEC0;
            --surface-color: #101010;
            --surface-strong: #1D1D1D;
            --border-color: #2C2F35;
            --menu-button-bg: rgba(64, 68, 75, 0.28);
            --menu-button-border: rgba(128, 128, 128, 0.45);
            --menu-button-color: #FFFFFF;
            --toggle-icon-color: #FFFFFF;
            --toggle-icon-default-color: #FFFFFF;
            --toggle-icon-active-color: #3B74FF;
            --filter-button-active-bg: rgba(59, 116, 255, 0.18);
            --filter-button-active-border: rgba(59, 116, 255, 0.35);
            --filter-button-active-color: #FFFFFF;
            --filter-button-border-default: transparent;
            --filter-button-bg-default: transparent;
        }

        body.dark-theme {
            --bg-color: #060606;
            --bg-second: #1D1D1DF2;
            --bg-third: #101010;
            --header-bg: #101010;
            --tab-bg: #101010;
            --input-field-second: #40444B66;
            --input-field-second-border: #808080;
            --btn-color: #007ACC66;
            --btn-border: #3B74FF;
            --btn-second-color: #F57D7D4D;
            --btn-second-border: #F57D7D;
            --modal-bg: #101010;
            --modal-border: #DADADA;
            --text-color: #FFFFFF;
            --text-muted: #A0AEC0;
            --surface-color: #101010;
            --surface-strong: #1D1D1D;
            --border-color: #2C2F35;
            --menu-button-bg: rgba(64, 68, 75, 0.28);
            --menu-button-border: rgba(128, 128, 128, 0.45);
            --menu-button-color: #FFFFFF;
            --toggle-icon-color: #FFFFFF;
            --filter-button-active-bg: rgba(59, 116, 255, 0.18);
            --filter-button-active-border: rgba(59, 116, 255, 0.35);
            --filter-button-active-color: #FFFFFF;
        }

        body.gray-theme {
            --bg-color: #202225;
            --bg-second: #40444B;
            --bg-third: #292B2F;
            --header-bg: #292B2F;
            --tab-bg: #292B2F;
            --input-field-second: #40444B;
            --input-field-second-border: #40444B;
            --btn-color: #007ACC;
            --btn-border: #007ACC;
            --btn-second-color: #F57D7D;
            --btn-second-border: #F57D7D;
            --modal-bg: #242629;
            --modal-border: #40444B;
            --text-color: #E0E0E0;
            --text-muted: #B0B6C1;
            --surface-color: #292B2F;
            --surface-strong: #40444B;
            --border-color: #40444B;
            --menu-button-bg: rgba(64, 68, 75, 0.45);
            --menu-button-border: rgba(148, 163, 184, 0.3);
            --menu-button-color: #E0E0E0;
            --toggle-icon-color: #E0E0E0;
            --filter-button-active-bg: rgba(0, 122, 204, 0.3);
            --filter-button-active-border: rgba(0, 122, 204, 0.6);
            --filter-button-active-color: #FFFFFF;
        }

        body.gray-theme .header-bar,
        body.gray-theme .tab-bar,
        body.gray-theme .sliding-menu {
            background-color: #292B2F !important;
            border-color: #40444B !important;
        }

        body.gray-theme .sliding-menu {
            box-shadow: -10px 0 30px rgba(0,0,0,0.2) !important;
        }

        body.gray-theme .sliding-menu span,
        body.gray-theme .sliding-menu h2,
        body.gray-theme .sliding-menu p {
            color: #E0E0E0 !important;
        }

        body.gray-theme .sliding-menu svg {
            color: #B0B6C1 !important;
            stroke: #B0B6C1 !important;
        }

        body.gray-theme .category-pill {
            background-color: #292B2F !important;
            border: 1px solid #40444B !important;
            color: #B0B6C1 !important;
        }

        body.gray-theme .category-pill.active {
            background-color: rgba(0, 122, 204, 0.25) !important;
            border-color: rgba(0, 122, 204, 0.6) !important;
            color: #FFFFFF !important;
        }

        body.gray-theme .card-bg,
        body.gray-theme .product-card,
        body.gray-theme .feature-card {
            background: rgba(41, 43, 47, 0.72) !important;
            backdrop-filter: blur(20px) brightness(1.1) saturate(1.2) !important;
            -webkit-backdrop-filter: blur(20px) brightness(1.1) saturate(1.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25) !important;
        }

        body.gray-theme .card-bg h3,
        body.gray-theme .card-bg p,
        body.gray-theme .card-bg span:not([class*="verified-checkmark"]),
        body.gray-theme .card-bg .text-slate-900 {
            color: #E0E0E0 !important;
        }

        body.gray-theme .card-bg .text-slate-600 {
            color: #B0B6C1 !important;
        }

        body.gray-theme [style*="background-color: #101010"],
        body.gray-theme [style*="background-color: #1D1D1D;"],
        body.gray-theme [style*="background-color: #292B2F"],
        body.gray-theme [style*="background-color: #40444B;"],
        body.gray-theme [style*="background-color: #40444B4D;"],
        body.gray-theme [style*="background-color: var(--bg-third)"],
        body.gray-theme .sliding-menu a,
        body.gray-theme .sliding-menu button {
            background-color: #292B2F !important;
            border-color: #40444B !important;
        }

        body.gray-theme .modal-content,
        body.gray-theme .bottom-sheet-content {
            background-color: #242629 !important;
            border: 1px solid #40444B !important;
        }

        body.light-theme {
            --bg-color: #F8FAFC;
            --bg-second: rgba(255, 255, 255, 0.76);
            --bg-third: rgba(248, 250, 252, 0.72);
            --header-bg: rgba(255, 255, 255, 0.92);
            --tab-bg: rgba(255, 255, 255, 0.98);
            --input-field-second: rgba(255, 255, 255, 0.9);
            --input-field-second-border: rgba(203, 213, 225, 0.75);
            --btn-color: #2563EB;
            --btn-border: #2563EB;
            --btn-second-color: #FBCFE8;
            --btn-second-border: #DB2777;
            --modal-bg: rgba(255, 255, 255, 0.95);
            --modal-border: rgba(203, 213, 225, 0.8);
            --text-color: #111827;
            --text-muted: #475569;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-strong: rgba(241, 245, 249, 0.82);
            --border-color: rgba(226, 232, 240, 0.9);
            --menu-button-bg: rgba(148, 163, 184, 0.16);
            --menu-button-border: rgba(203, 213, 225, 0.9);
            --menu-button-color: var(--text-color);
            --toggle-icon-color: var(--text-color);
            --toggle-icon-default-color: var(--text-color);
            --toggle-icon-active-color: #2563EB;
            --filter-button-active-bg: rgba(37, 99, 235, 0.16);
            --filter-button-active-border: rgba(37, 99, 235, 0.35);
            --filter-button-active-color: #1D4ED8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body.light-theme [class*="text-white"] {
            color: var(--text-color) !important;
        }

        body.light-theme [class*="placeholder-white"]::placeholder {
            color: var(--text-muted) !important;
        }

        body.light-theme [style*="background-color: #101010"] {
            background-color: var(--surface-color) !important;
        }

        body.light-theme [style*="background-color: #292B2F"] {
            background-color: var(--bg-third) !important;
        }

        body.light-theme [style*="background-color: #40444B;"] {
            background-color: var(--input-field-second) !important;
        }

        body.light-theme [style*="background-color: #40444B4D;"] {
            background-color: rgba(148, 163, 184, 0.18) !important;
        }

        body.light-theme [style*="background-color: #1D1D1D;"] {
            background-color: var(--surface-color) !important;
        }

        body.light-theme [style*="background-color: #FFFFFF1A;"] {
            background-color: rgba(96, 165, 250, 0.12) !important;
        }

        body.light-theme [class*="bg-[#40444B4D]"] {
            background-color: rgba(148, 163, 184, 0.18) !important;
        }

        body.light-theme .glass-panel,
        body.light-theme .glass-panel-soft {
            backdrop-filter: blur(18px);
        }

        body.light-theme .glass-panel {
            background-color: rgba(255, 255, 255, 0.72) !important;
            border-color: rgba(148, 163, 184, 0.35) !important;
        }

        body.light-theme .glass-panel-soft {
            background-color: rgba(255, 255, 255, 0.86) !important;
            border-color: rgba(226, 232, 240, 0.8) !important;
        }

        .filter-button {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease,
                box-shadow 0.2s ease;
            background-color: var(--filter-button-bg-default);
            border-color: var(--filter-button-border-default);
            color: var(--text-color);
        }

        .filter-button.active-filter-btn {
            background-color: var(--filter-button-active-bg) !important;
            border-color: var(--filter-button-active-border) !important;
            color: var(--filter-button-active-color) !important;
            box-shadow: 0 12px 35px rgba(14, 165, 233, 0.12);
            backdrop-filter: blur(18px);
        }

        .toggle-icon-container {
            color: var(--toggle-icon-default-color);
            transition: color 0.2s ease;
        }

        .toggle-icon-container.active-toggle-icon {
            color: var(--toggle-icon-active-color) !important;
        }

        .menu-toggle-button {
            background-color: var(--menu-button-bg);
            border-color: var(--menu-button-border);
            color: var(--menu-button-color);
        }

        body.light-theme .bg-gray-800\/50 {
            background-color: rgba(255, 255, 255, 0.72) !important;
        }

        body.light-theme .border-gray-700\/50 {
            border-color: rgba(148, 163, 184, 0.35) !important;
        }

        body.light-theme .bg-blue-600\/20 {
            background-color: rgba(37, 99, 235, 0.16) !important;
        }

        body.light-theme .border-blue-500\/50 {
            border-color: rgba(59, 130, 246, 0.28) !important;
        }

        body.light-theme .text-gray-500,
        body.light-theme .text-gray-400 {
            color: rgba(71, 85, 105, 0.78) !important;
        }

        body.light-theme .text-white {
            color: var(--text-color) !important;
        }

        body.light-theme #locationModal {
            background-color: rgba(255, 255, 255, 0.72) !important;
        }

        body.light-theme #locationModal .text-white,
        body.light-theme #locationModal .text-gray-400 {
            color: var(--text-color) !important;
        }

        body.light-theme [class*="border-[#3A3B3F]"] {
            border-color: var(--border-color) !important;
        }

        /* Adjust Shop Icon color for light themes */
        body.light-theme img[src*="ShopImage.png"],
        body.liquid-glass-theme img[src*="ShopImage.png"] {
            filter: invert(1);
            opacity: 0.8;
        }

        /* Remove shadows globally in light mode */
        body.light-theme * {
            box-shadow: none !important;
        }

        body.liquid-glass-theme {
            --bg-color: #F5F5F7;
            --bg-second: rgba(255, 255, 255, 0.45);
            --bg-third: rgba(255, 255, 255, 0.35);
            --header-bg: rgba(255, 255, 255, 0.3);
            --tab-bg: rgba(255, 255, 255, 0.5);
            --input-field-second: rgba(255, 255, 255, 0.5);
            --input-field-second-border: rgba(255, 255, 255, 0.8);
            --btn-color: #0071E3;
            /* Apple Blue */
            --btn-border: #0071E3;
            --btn-second-color: rgba(0, 0, 0, 0.04);
            --btn-second-border: rgba(0, 0, 0, 0.1);
            --modal-bg: rgba(255, 255, 255, 0.5);
            --modal-border: rgba(255, 255, 255, 0.8);
            --text-color: #1D1D1F;
            --text-muted: #86868B;
            --surface-color: rgba(255, 255, 255, 0.4);
            --surface-strong: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.6);
            --menu-button-bg: rgba(255, 255, 255, 0.3);
            --menu-button-border: rgba(255, 255, 255, 0.7);
            --menu-button-color: #1D1D1F;
            --toggle-icon-color: #1D1D1F;
            --toggle-icon-default-color: #1D1D1F;
            --toggle-icon-active-color: #1A1A1A;
            --filter-button-active-bg: rgba(0, 113, 227, 0.18);
            --filter-button-active-border: rgba(0, 113, 227, 0.4);
            --filter-button-active-color: #1D1D1F;
        }

        /* Professional Liquid background (Neutral monochrome) */
        body.liquid-glass-theme {
            background: linear-gradient(135deg, #FFFFFF 0%, #F9FAFB 35%, #F1F2F4 100%);
            background-attachment: fixed;
        }

        body.liquid-glass-theme [class*="text-white"] {
            color: var(--text-color) !important;
        }

        body.liquid-glass-theme [class*="placeholder-white"]::placeholder {
            color: var(--text-muted) !important;
        }

        body.liquid-glass-theme [style*="background-color: #101010"],
        body.liquid-glass-theme [style*="background-color: #292B2F"],
        body.liquid-glass-theme [style*="background-color: #1D1D1D;"],
        body.liquid-glass-theme [style*="background-color: #40444B;"],
        body.liquid-glass-theme [style*="background-color: #40444B4D;"] {
            background-color: var(--surface-color) !important;
            border-color: var(--border-color) !important;
        }

        body.liquid-glass-theme [class*="bg-[#40444B4D]"] {
            background-color: var(--surface-color) !important;
        }

        /* Professional "Water Liquid" effect */
        body.liquid-glass-theme .header-bar,
        body.liquid-glass-theme .tab-bar,
        body.liquid-glass-theme .sliding-menu,
        body.liquid-glass-theme .glass-panel,
        body.liquid-glass-theme .glass-panel-soft,
        body.liquid-glass-theme .card-bg,
        body.liquid-glass-theme #locationModal>div,
        body.liquid-glass-theme .theme-modal-content {
            background: rgba(255, 255, 255, 0.18) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.6) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.4) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow:
                0 12px 40px -15px rgba(0, 0, 0, 0.08),
                inset 0 1px 1px 0 rgba(255, 255, 255, 0.7),
                inset 0 -1px 3px 0 rgba(0, 0, 0, 0.02) !important;
            backdrop-filter: blur(25px) brightness(1.05) contrast(1.1) saturate(100%) !important;
            -webkit-backdrop-filter: blur(25px) brightness(1.05) contrast(1.1) saturate(100%) !important;
        }

        body.liquid-glass-theme .sliding-menu {
            box-shadow: -15px 0 35px rgba(0, 0, 0, 0.1), inset 1px 0 0 rgba(255, 255, 255, 0.8) !important;
        }

        /* Header Bar: Deep Liquid Glass with Water Effect */
        @keyframes headerWaterShimmer {
            0%   { transform: translateX(-200%) skewX(-15deg); opacity: 0; }
            20%  { opacity: 0.45; }
            80%  { opacity: 0.25; }
            100% { transform: translateX(500%) skewX(-15deg); opacity: 0; }
        }

        body.liquid-glass-theme .header-bar {
            background: rgba(255, 255, 255, 0.1) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
            box-shadow:
                0 8px 32px -10px rgba(0, 0, 0, 0.06),
                inset 0 -1px 0 rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(30px) brightness(1.05) contrast(1.1) saturate(120%) !important;
            -webkit-backdrop-filter: blur(30px) brightness(1.05) contrast(1.1) saturate(120%) !important;
            overflow: hidden;
        }

        body.liquid-glass-theme .ripple-surface {
            position: absolute;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.08) !important;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=') !important;
            background-size: cover !important;
            z-index: 0;
        }

        /* Water sheen sweep across header */
        body.liquid-glass-theme .header-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 80px; height: 100%;
            pointer-events: none;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 40%,
                rgba(255, 255, 255, 0.55) 50%,
                rgba(255, 255, 255, 0.3) 60%,
                transparent 100%);
            animation: headerWaterShimmer 5s ease-in-out infinite;
            animation-delay: 0.5s;
            z-index: 0;
        }

        body.liquid-glass-theme .header-bar > * {
            position: relative;
            z-index: 1;
        }

        body.liquid-glass-theme .menu-toggle-button,
        body.liquid-glass-theme .search-container,
        body.liquid-glass-theme .theme-modal-back-btn {
            background: rgba(255, 255, 255, 0.25) !important;
            backdrop-filter: blur(20px) brightness(1.05) contrast(1.1) !important;
            -webkit-backdrop-filter: blur(20px) brightness(1.05) contrast(1.1) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.7) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.5) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.6);
        }

        body.liquid-glass-theme .border-\[\#3A3B3F\],
        body.liquid-glass-theme .border-gray-700\/50 {
            border-color: rgba(255, 255, 255, 0.4) !important;
        }

        body.liquid-glass-theme .text-gray-500,
        body.liquid-glass-theme .text-gray-400,
        body.liquid-glass-theme #menuUserEmail {
            color: #4A4A4C !important;
        }

        body.liquid-glass-theme #menuUserName {
            color: #1D1D1F !important;
        }

        /* Liquid Glass Nav Bar Enhancements */
        body.liquid-glass-theme .tab-bar {
            background: rgba(255, 255, 255, 0.12) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.5) !important;
            box-shadow:
                0 -8px 32px -8px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(30px) brightness(1.05) contrast(1.1) saturate(120%) !important;
            -webkit-backdrop-filter: blur(30px) brightness(1.05) contrast(1.1) saturate(120%) !important;
            overflow: hidden;
            position: relative;
        }

        /* Water shimmer sweep animation */
        @keyframes navWaterShimmer {
            0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
            30% { opacity: 0.5; }
            70% { opacity: 0.3; }
            100% { transform: translateX(400%) skewX(-20deg); opacity: 0; }
        }

        @keyframes navRipplePulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }

        body.liquid-glass-theme .tab-water-sheen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        body.liquid-glass-theme .tab-water-sheen::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 60px; height: 100%;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.35) 40%,
                rgba(255, 255, 255, 0.6) 50%,
                rgba(255, 255, 255, 0.35) 60%,
                transparent 100%);
            animation: navWaterShimmer 4.5s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        body.liquid-glass-theme .tab-water-sheen::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 30px; height: 100%;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 100%);
            animation: navWaterShimmer 6s ease-in-out infinite;
            animation-delay: 3s;
        }

        body.liquid-glass-theme .tab-bar a {
            position: relative;
            z-index: 1;
        }

        body.liquid-glass-theme .tab-bar a svg {
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08));
        }

            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sliding-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 400px;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 1000;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

            right: 0;

            display: none;
        }

        }

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .text-truncate-2 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            text-overflow: ellipsis;
        }

        /* Loading spinner for companies (matches iOS home.html) */
        .refresh-spinner {
            width: 36px;
            height: 36px;
            position: relative;
        }

        .refresh-spinner::before,
        .refresh-spinner::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .refresh-spinner::before {
            border: 3px solid transparent;
            border-top-color: #3B74FF;
            border-right-color: #3B74FF;
            filter: drop-shadow(0 0 6px rgba(59, 116, 255, 0.6));
            animation: spin 0.9s linear infinite;
        }

        .refresh-spinner::after {
            inset: 6px;
            border: 3px solid transparent;
            border-bottom-color: #8BB0FF;
            border-left-color: #8BB0FF;
            animation: spinReverse 1.1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spinReverse {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(-360deg);
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

    <script src="js/distanceCalculator.js"></script>
    <script>
        let cardSingle = true; // true = list view, false = grid view
        let currentFilter = 'around';
        let searchQuery = '';
        let userLocation = null;
        let isRefreshing = false;
        let locationPermissionGranted = localStorage.getItem('locationPermissionGranted') === 'true';

        // Companies data will be loaded from database
        let companies = [];
        // Stable randomized view of companies for UX (used for 'all' filter)
        let shuffledCompanies = [];
        let companiesDataLoaded = false;

        // Handle search input
        async function handleSearch() {
            const searchInput = document.getElementById('searchInput');
            searchQuery = searchInput.value.toLowerCase();
            await renderCompanies();
        }

        // Clear search input and reset results
        async function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            searchQuery = '';
            await renderCompanies();
        }

        // Calculate distance and time using advanced distance calculator
        async function calculateDistanceAndTime(fromCoords, toCoords) {
            try {
                // Validate input coordinates
                if (!fromCoords || !toCoords ||
                    !fromCoords.lat || !fromCoords.lng ||
                    !toCoords.lat || !toCoords.lng ||
                    isNaN(fromCoords.lat) || isNaN(fromCoords.lng) ||
                    isNaN(toCoords.lat) || isNaN(toCoords.lng)) {
                    return {
                        distance: null,
                        time: 'Unknown distance',
                        accuracy: 'low'
                    };
                }

                if (window.distanceCalculator) {
                    const result = await window.distanceCalculator.calculateDistanceAndTime(fromCoords, toCoords, { mode: 'driving' });
                    const distance = result.distance ? result.distance.km : null;
                    return {
                        distance: distance,
                        time: result.duration ? result.duration.text : 'Unknown distance',
                        accuracy: result.accuracy || 'high'
                    };
                } else {
                    // Enhanced fallback calculation with road factors
                    const distanceKm = calculateEnhancedDistance(fromCoords, toCoords);
                    return {
                        distance: distanceKm,
                        time: distanceKm ? generateEstimatedTime(distanceKm) : 'Unknown distance',
                        accuracy: 'estimated'
                    };
                }
            } catch (error) {
                // Enhanced fallback calculation
                const distanceKm = calculateEnhancedDistance(fromCoords, toCoords);
                return {
                    distance: distanceKm,
                    time: distanceKm ? generateEstimatedTime(distanceKm) : 'Unknown distance',
                    accuracy: 'estimated'
                };
            }
        }

        // Enhanced distance calculation with road network factors
        function calculateEnhancedDistance(fromCoords, toCoords) {
            // Validate input coordinates
            if (!fromCoords || !toCoords ||
                !fromCoords.lat || !fromCoords.lng ||
                !toCoords.lat || !toCoords.lng ||
                isNaN(fromCoords.lat) || isNaN(fromCoords.lng) ||
                isNaN(toCoords.lat) || isNaN(toCoords.lng)) {
                return null;
            }

            // Calculate straight-line distance using Haversine
            const straightDistance = haversineDistance(fromCoords, toCoords);

            // Validate the calculated distance
            if (!straightDistance || isNaN(straightDistance) || straightDistance <= 0) {
                return null;
            }

            // Apply road network factor (1.3 for urban areas)
            const roadFactor = 1.3;
            const enhancedDistance = straightDistance * roadFactor;

            // Final validation
            if (isNaN(enhancedDistance) || enhancedDistance <= 0) {
                return null;
            }

            return enhancedDistance;
        }

        // Haversine distance calculation (only for fallback)
        function haversineDistance(fromCoords, toCoords) {
            const R = 6371; // Earth's radius in kilometers
            const dLat = toRadians(toCoords.lat - fromCoords.lat);
            const dLng = toRadians(toCoords.lng - fromCoords.lng);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(toRadians(fromCoords.lat)) * Math.cos(toRadians(toCoords.lat)) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Convert degrees to radians
        function toRadians(degrees) {
            return degrees * (Math.PI / 180);
        }

        // Generate estimated time based on distance
        function generateEstimatedTime(distanceKm) {
            // Validate input
            if (!distanceKm || isNaN(distanceKm) || distanceKm <= 0) {
                return 'Unknown time';
            }

            const avgSpeed = 30; // km/h average city driving speed
            const timeMinutes = Math.round((distanceKm / avgSpeed) * 60);

            // Validate calculated time
            if (isNaN(timeMinutes) || timeMinutes <= 0) {
                return 'Unknown time';
            }

            if (timeMinutes < 5) return 'Less than 5 min';
            if (timeMinutes < 15) return `${timeMinutes} min`;
            if (timeMinutes < 60) return `${timeMinutes} min`;

            const hours = Math.floor(timeMinutes / 60);
            const minutes = timeMinutes % 60;
            return minutes > 0 ? `${hours}h ${minutes}m` : `${hours}h`;
        }

        // Get verified icon CSS class based on verification tier
        function getVerifiedIconClass(tier) {
            let cssClass;
            switch (tier) {
                case 2:
                    cssClass = 'verified-checkmark-tier2'; // Blue icon
                    break;
                case 3:
                    cssClass = 'verified-checkmark-tier3'; // Gold icon
                    break;
                default:
                    cssClass = 'verified-checkmark-tier2'; // Default to blue (tier2)
                    break;
            }
            return cssClass;
        }

        // Utility: shuffle an array (Fisher–Yates)
        function shuffleArray(arr) {
            const array = arr.slice();
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        // Filter companies based on search query, location, and verification tier
        async function getFilteredCompanies() {
            // Base list:
            // - 'around' view: keep real order so we can sort by distance (best UX)
            // - 'all' view: use a stable randomized list so order changes only when data is refreshed
            let baseList;
            if (currentFilter === 'around') {
                baseList = companies;
            } else {
                if (!shuffledCompanies || shuffledCompanies.length === 0) {
                    shuffledCompanies = shuffleArray(companies);
                }
                baseList = shuffledCompanies;
            }

            let filtered = baseList;

            // Apply verification tier filtering
            filtered = filtered.filter(company => {
                const tier = company.verification_tier || 2; // Default to tier2 if not set
                // Hide tier1 companies, show tier2 and tier3
                const shouldShow = tier !== 1;
                return shouldShow;
            });

            // Apply search filter
            if (searchQuery) {
                filtered = filtered.filter(company =>
                    company.name.toLowerCase().includes(searchQuery) ||
                    company.location.toLowerCase().includes(searchQuery)
                );
            }

            // Apply location filter with enhanced distance calculation
            if (userLocation) {
                // Calculate distances synchronously for instant results
                const companiesWithDistance = filtered.map((company) => {
                    if (company.coordinates) {
                        const distanceKm = calculateEnhancedDistance(userLocation, company.coordinates);
                        return {
                            ...company,
                            distance: distanceKm,
                            time: distanceKm ? generateEstimatedTime(distanceKm) : 'Unknown distance',
                            accuracy: 'estimated'
                        };
                    }
                    return { ...company, distance: null, time: company.time || 'Unknown distance' };
                });

                // Apply location-based filtering only for 'around' filter
                if (currentFilter === 'around') {
                    filtered = companiesWithDistance
                        .filter(company => company.distance !== null && company.distance <= 50)
                        .sort((a, b) => a.distance - b.distance);
                } else {
                    // For 'all' filter, keep all companies but with calculated distances
                    filtered = companiesWithDistance;
                }
            }

            return filtered;
        }

        // Set filter view (Around you / All)
        async function setViewFilter(filter) {
            currentFilter = filter;
            const aroundBtn = document.getElementById('aroundBtn');
            const allBtn = document.getElementById('allBtn');
            const activeClass = 'active-filter-btn';

            if (filter === 'around') {
                aroundBtn.classList.add(activeClass);
                allBtn.classList.remove(activeClass);
            } else {
                allBtn.classList.add(activeClass);
                aroundBtn.classList.remove(activeClass);
            }
            await renderCompanies();
        }

        // Toggle card view (List / Grid)
        async function toggleCardView() {
            cardSingle = !cardSingle;
            renderToggleIcon();
            await renderCompanies();
        }

        function renderToggleIcon() {
            const container = document.getElementById('toggleIconContainer');
            const toggleButton = document.getElementById('toggleViewBtn');
            if (cardSingle) {
                // List view active -> Show Icon for "Grid Switch" which is TableSwipe in RN (Grid of squares)
                container.innerHTML = `
                   <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                   </svg>
                `;
            } else {
                // Grid view active -> Show List Icon (3 lines)
                container.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="12" x2="21" y2="12" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="18" x2="21" y2="18" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="4" cy="6" r="1.5" fill="currentColor"/>
                        <circle cx="4" cy="12" r="1.5" fill="currentColor"/>
                        <circle cx="4" cy="18" r="1.5" fill="currentColor"/>
                    </svg>
                `;
            }

            if (toggleButton) {
                toggleButton.classList.toggle('active-toggle-icon', !cardSingle);
            }
        }

        // Render companies based on view mode
        async function renderCompanies() {
            const container = document.getElementById('companiesContainer');

            // Show loading indicator while companies are being fetched
            const manager = window.companyDataManager;
            const isLoadingNow = manager && manager.isLoading;
            if (!companiesDataLoaded || isLoadingNow) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12">
                        <div class="refresh-spinner"></div>
                        <p class="text-white mt-3 text-base font-medium">Loading companies...</p>
                    </div>
                `;
                return;
            }

            const filteredCompanies = await getFilteredCompanies();
            let html = '';

            if (filteredCompanies.length === 0) {
                html = `
                    <div class="flex flex-col items-center justify-center py-20 px-8">
                        <div class="w-24 h-24 bg-white/70 backdrop-blur-sm border border-slate-200/70 rounded-full flex items-center justify-center mx-auto mb-6 glass-panel-soft">
                            <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                            </svg>
                        </div>
                        <div class="text-slate-900 text-center">
                            <h3 class="text-xl font-medium mb-2">No Services Found</h3>
                            <p class="text-gray-500 mb-6">
                                ${searchQuery ? 'No services match your search criteria.' :
                        currentFilter === 'around' ? 'No services found within 50km of your location.' :
                            'No water services available in your area.'}
                            </p>
                            <div class="space-y-3">
                                ${searchQuery ? `
                                    <button onclick="clearSearch()" class="px-4 py-2 bg-white/70 backdrop-blur-sm border border-slate-200/70 rounded-lg hover:bg-white/80 transition-all duration-300 text-sm text-slate-900">
                                        Clear Search
                                    </button>
                                ` : ''}
                                <button onclick="location.reload()" class="px-4 py-2 bg-blue-600/20 backdrop-blur-sm border border-blue-500/50 rounded-lg hover:bg-blue-600/30 transition-all duration-300 text-sm flex items-center gap-2 mx-auto text-slate-900">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                    </svg>
                                    Refresh Services
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (cardSingle) {
                // List View
                html = '<div class="flex flex-col gap-1">';
                filteredCompanies.forEach((company, index) => {
                    // Default distance label
                    let distanceText = 'Unknown distance';

                    if (userLocation) {
                        // When we know the user's location:
                        // - If distance not ready/invalid -> "Locating..."
                        // - If valid distance -> show km away
                        if (company.distance === undefined || company.distance === null || isNaN(company.distance) || company.distance <= 0) {
                            distanceText = 'Locating...';
                        } else {
                            distanceText = `${company.distance.toFixed(1)} km away`;
                        }
                    } else {
                        // When we don't know user location, fall back to company.time only if it's sane
                        if (typeof company.time === 'string' && !company.time.toLowerCase().includes('nan')) {
                            distanceText = company.time;
                        }
                    }
                    const accuracyBadge = company.accuracy === 'high' ?
                        '<span class="text-xs text-green-400 ml-1">●</span>' :
                        company.accuracy === 'estimated' ?
                            (company.distance !== null && company.distance <= 50 ?
                                '<span class="text-xs text-green-400 ml-1">●</span>' :
                                '<span class="text-xs text-yellow-400 ml-1">●</span>') : '';

                    html += `
                        <a href="schedule.html?branch_id=${company.branch_id}" 
                           class="card-bg w-full flex items-center justify-center px-4"
                           style="height: 120px; margin-top: 4px;">
                            <div class="flex flex-row w-full items-center gap-3">
                                <!-- Image -->
                                <div class="rounded-[10px] bg-slate-200 overflow-hidden" style="width: 22%; height: 89px;">
                                    ${company.profile_image ?
                            `<img src="${company.profile_image}" class="w-full h-full object-cover" alt="${company.name}">` :
                            `<div class="w-full h-full bg-white/70 backdrop-blur-sm border border-slate-200/70 flex items-center justify-center glass-panel-soft">
                                            <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                                            </svg>
                                        </div>`
                        }
                                </div>
                                <!-- Info -->
                                <div class="flex flex-col gap-2 ml-2 text-left" style="width: 47%;">
                                    <h3 class="text-slate-900 text-xl font-medium text-truncate">
                                        ${company.name}
                                        <span class="material-symbols-outlined ${getVerifiedIconClass(company.verification_tier)}">verified</span>
                                    </h3>
                                    <p class="text-slate-900 text-lg font-medium text-truncate">${company.location}</p>
                                    <span class="text-slate-600 text-sm font-normal">${distanceText}${accuracyBadge}</span>
                                </div>
                                <!-- View Shop -->
                                <div class="flex flex-col items-center justify-center" style="width: 20%; height: 60px;">
                                    <img src="images/main/ShopImage.png" class="w-7 h-7" alt="Shop">
                                    <span class="text-slate-900 text-base font-medium whitespace-nowrap">View shop</span>
                                </div>
                            </div>
                        </a>
                    `;
                    // Ads banner after 2nd item
                    if (index === 1) html += renderAdsBanner();
                });
                html += '</div>';
            } else {
                // Grid View
                html = `<div class="grid grid-cols-2 gap-[10px] px-[10px] pt-[10px] pb-[100px]">`;
                filteredCompanies.forEach((company, index) => {
                    // Default distance label
                    let distanceText = 'Unknown';

                    if (userLocation) {

        // Check if companies data has changed
        function hasCompaniesChanged(newData, oldData) {
            if (!oldData || oldData.length === 0) return true;
            if (!newData || newData.length === 0) return false;
            if (newData.length !== oldData.length) return true;

            // Check for updated timestamps or new companies
            for (let i = 0; i < newData.length; i++) {
                const newCompany = newData[i];
                const oldCompany = oldData.find(c => c.company_id === newCompany.company_id);

                if (!oldCompany) return true; // New company found

                // Check for updates
                if (newCompany.$updatedAt && oldCompany.$updatedAt) {
                    if (newCompany.$updatedAt !== oldCompany.$updatedAt) return true;
                }
            }

            return false;
        }

                    if (user && user.name) {
                        const firstName = user.name.split(' ')[0];
                        const displayName = firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase();

                    <div class="flex flex-row items-center gap-[30px]">
                        <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span class="text-white text-lg font-semibold">Signed out!</span>
                    </div>
                    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                `;

                // Redirect to signin page after brief delay
                setTimeout(() => {
                    window.location.href = 'signin.html';
                }, 500);

            } catch (error) {
                // Show error state
                logoutBtn.innerHTML = `
                    <div class="flex flex-row items-center gap-[30px]">
                        <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                        <span class="text-white text-lg font-semibold">Error</span>
                    </div>
                    <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                `;

                // Even if there's an error, clear storage and redirect after brief delay
                setTimeout(() => {
                    localStorage.removeItem('customerSession');
                    localStorage.removeItem('currentUser');
                    localStorage.removeItem('userName');
                    localStorage.removeItem('userEmail');
                    window.location.href = 'signin.html';
                }, 1000);
            }
        }

        // Delete Account Confirmation function
        window.showDeleteConfirm = function () {
            // Create modal overlay following the existing pattern
            const modalOverlay = document.createElement('div');
            modalOverlay.id = 'deleteAccountModal';
            modalOverlay.className = 'fixed inset-0 z-50 flex items-center justify-center p-9';
            modalOverlay.style.cssText = 'display: flex; backdrop-filter: blur(20px); background-color: rgba(0,0,0,0.5);';

            // Create modal content following existing modal pattern
            const modalContent = document.createElement('div');
            modalContent.className = 'rounded-[30px] w-full max-w-[350px] px-10 py-7 flex flex-col items-center justify-center border-[0.2px]';
            modalContent.style.cssText = 'background-color: var(--modal-bg); border-color: var(--modal-border);';

            modalContent.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full h-full">
                    <!-- Warning Icon Section -->
                    <div class="flex flex-col items-center justify-center mb-6">
                        <div class="w-[80px] h-[80px] rounded-full flex items-center justify-center mb-4"
                             style="background-color: rgba(245, 125, 125, 0.1);">
                            <svg class="w-[40px] h-[40px] text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </div>
                        
                        <h2 class="text-white text-[20px] font-bold text-center mb-3">Delete Account</h2>
                        <p class="text-gray-400 text-[14px] text-center leading-[20px] mb-6">
                            Are you sure you want to delete your account? This action cannot be undone and will permanently delete:
                        </p>
                        
                        <div class="w-full text-left mb-6">
                            <div class="text-gray-400 text-[13px] space-y-2">
                                <div class="flex items-center gap-2">
                                    <svg class="w-[4px] h-[4px] text-red-500" fill="currentColor" viewBox="0 0 8 8">
                                        <circle cx="4" cy="4" r="2"/>
                                    </svg>
                                    <span>Your profile information</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <svg class="w-[4px] h-[4px] text-red-500" fill="currentColor" viewBox="0 0 8 8">
                                        <circle cx="4" cy="4" r="2"/>
                                    </svg>
                                    <span>Order history</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <svg class="w-[4px] h-[4px] text-red-500" fill="currentColor" viewBox="0 0 8 8">
                                        <circle cx="4" cy="4" r="2"/>
                                    </svg>
                                    <span>Saved preferences</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <svg class="w-[4px] h-[4px] text-red-500" fill="currentColor" viewBox="0 0 8 8">
                                        <circle cx="4" cy="4" r="2"/>
                                    </svg>
                                    <span>All associated data</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Button Section -->
                    <div class="w-full flex items-center gap-3">
                        <!-- Cancel Button -->
                        <button onclick="cancelDeleteAccount()"
                                class="h-[37px] flex-1 rounded-[100px] flex items-center justify-center border transition-all hover:opacity-80"
                                style="background-color: var(--btn-second-color); border-color: var(--btn-second-border);">
                            <span class="text-white text-base font-semibold capitalize">Cancel</span>
                        </button>
                        
                        <!-- Delete Button -->
                        <button onclick="confirmDeleteAccount()"
                                class="h-[37px] flex-1 rounded-[100px] flex items-center justify-center border transition-all hover:opacity-80"
                                style="background-color: #F57D7D; border-color: #F57D7D;">
                            <span class="text-white text-base font-semibold capitalize">Delete</span>
                        </button>
                    </div>
                </div>
            `;

            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);

            // Close modal when clicking overlay
            modalOverlay.addEventListener('click', function (e) {
                if (e.target === modalOverlay) {
                    cancelDeleteAccount();
                }
            });
        };

        // Show delete success modal
        window.showDeleteSuccessModal = function () {
            // Close the delete confirmation modal first
            const deleteModal = document.getElementById('deleteAccountModal');
            if (deleteModal) {
                deleteModal.remove();
            }

            // Create success modal overlay
            const modalOverlay = document.createElement('div');
            modalOverlay.id = 'deleteSuccessModal';
            modalOverlay.className = 'fixed inset-0 z-50 flex items-center justify-center p-9';
            modalOverlay.style.cssText = 'display: flex; backdrop-filter: blur(20px); background-color: rgba(0,0,0,0.5);';

            // Create modal content
            const modalContent = document.createElement('div');
            modalContent.className = 'rounded-[30px] w-full max-w-[350px] px-10 py-7 flex flex-col items-center justify-center border-[0.2px]';
            modalContent.style.cssText = 'background-color: var(--modal-bg); border-color: var(--modal-border);';

            modalContent.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full h-full">
                    <!-- Success Icon Section -->
                    <div class="flex flex-col items-center justify-center mb-6">
                        <div class="w-[80px] h-[80px] rounded-full flex items-center justify-center mb-4"
                             style="background-color: rgba(34, 197, 94, 0.1);">
                            <svg class="w-[40px] h-[40px] text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                        
                        <h2 class="text-white text-[20px] font-bold text-center mb-3">Account Deleted</h2>
                        <p class="text-gray-400 text-[14px] text-center leading-[20px] mb-4">
                            Your account has been successfully deleted.
                        </p>
                        <p class="text-gray-500 text-[13px] text-center leading-[18px]">
                            Redirecting to sign-in page...
                        </p>
                        
                        <!-- Loading indicator -->
                        <div class="flex items-center gap-1 mt-4">
                            <div class="w-[6px] h-[6px] rounded-full bg-green-500 animate-pulse"></div>
                            <div class="w-[6px] h-[6px] rounded-full bg-green-500 animate-pulse" style="animation-delay: 0.2s"></div>
                            <div class="w-[6px] h-[6px] rounded-full bg-green-500 animate-pulse" style="animation-delay: 0.4s"></div>
                        </div>
                    </div>
                </div>
            `;

            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);

            // Auto-remove modal after redirect (backup cleanup)
            setTimeout(() => {
                const modal = document.getElementById('deleteSuccessModal');
                if (modal) {
                    modal.remove();
                }
            }, 3000);
        };

        // Cancel delete account
        window.cancelDeleteAccount = function () {
            const modal = document.getElementById('deleteAccountModal');
            if (modal) {
                modal.remove();
            }
        };

        // Confirm delete account
        window.confirmDeleteAccount = async function () {
            try {
                // Show loading state
                const deleteBtn = document.querySelector('#deleteAccountModal button[onclick="confirmDeleteAccount()"] span');
                const originalText = deleteBtn.textContent;
                deleteBtn.textContent = 'Deleting...';
                deleteBtn.parentElement.disabled = true;

                // Get current user
                const user = await window.account.get();
                const userEmail = user.email;

                // Delete from customer_tb first
                try {
                    const customerDocs = await window.databases.listDocuments(
                        window.appwriteConfig.DATABASE_ID,
                        window.appwriteConfig.CUSTOMER_TABLE,
                        [window.Query.equal('email', userEmail.toLowerCase())]
                    );

                    // Delete customer records
                    for (const doc of customerDocs.documents) {
                        await window.databases.deleteDocument(
                            window.appwriteConfig.DATABASE_ID,
                            window.appwriteConfig.CUSTOMER_TABLE,
                            doc.$id
                        );
                    }
                } catch (dbError) {
                }

                // Immediately logout user by deleting all sessions
                try {
                    const sessions = await window.account.listSessions();
                    for (const session of sessions.sessions) {
                        await window.account.deleteSession(session.$id);
                    }
                } catch (sessionError) {
                    // Try to delete current session as fallback
                    try {
                        await window.account.deleteSession('current');
                    } catch (fallbackError) {
                    }
                }

                // Clear local storage immediately after logout
                localStorage.clear();
                // Show success modal
                showDeleteSuccessModal();

                // Redirect to sign-in page after delay
                setTimeout(() => {
                    window.location.href = 'signin.html';
                }, 2500);

            } catch (error) {
                // Reset button
                const deleteBtn = document.querySelector('#deleteAccountModal button[onclick="confirmDeleteAccount()"] span');
                deleteBtn.textContent = 'Delete';
                deleteBtn.parentElement.disabled = false;

                // Show error message
                alert('Failed to delete account. Please try again or contact support. Error: ' + error.message);
            }
        };

        // Navigation State Management
        function saveCurrentPage() {
            localStorage.setItem('previousPage', window.location.pathname.split('/').pop());
        }

        function navigateToPage(page) {
            saveCurrentPage();
            window.location.href = page;
        }

        // Handle browser back button
        window.addEventListener('popstate', function (event) {
            const previousPage = localStorage.getItem('previousPage');
            if (previousPage && previousPage !== window.location.pathname.split('/').pop()) {
                // Navigate back to the saved page
                window.location.href = previousPage;
            }
        });

        // Initialize navigation state on page load
        document.addEventListener('DOMContentLoaded', function () {
            // Clear previous page when landing directly on this page
            if (!localStorage.getItem('previousPage')) {
                localStorage.setItem('previousPage', 'home.html');
            }
        });
    </script>

    <!-- Service Worker Registration & Update Notification Logic -->
    <script src="js/pwa-update.js?v=7"></script>
</body>
