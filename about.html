        :root {
            --bg-color: #060606;
            --bg-third: #101010;
            --text-color: #FFFFFF;
            --muted-text: rgba(148, 163, 184, 0.9);
            --border-color: #DADADA;
            --icon-color: #94A3B8;
        }

        body.dark-theme {
            --bg-color: #060606;
            --bg-third: #101010;
            --text-color: #FFFFFF;
            --muted-text: rgba(148, 163, 184, 0.9);
            --border-color: #DADADA;
            --icon-color: #94A3B8;
        }

        body.liquid-glass-theme {
            --bg-color: #F8FAFC;
            --bg-second: rgba(255, 255, 255, 0.45);
            --bg-third: rgba(255, 255, 255, 0.22);
            --header-bg: rgba(255, 255, 255, 0.22);
            --text-color: #111111;
            --muted-text: #3A3A3C;
            --border-color: rgba(255, 255, 255, 0.85);
            --icon-color: #111111;
        }

        body.liquid-glass-theme {
            background: linear-gradient(135deg, #FFFFFF 0%, #F9FAFB 35%, #F1F2F4 100%);
            background-attachment: fixed;
        }

        /* Glass Panel Overrides */
        body.liquid-glass-theme .w-full.h-\[60px\] {
            background: rgba(255, 255, 255, 0.22) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.6) !important;
            overflow: hidden;
            position: relative;
        }

        @keyframes aboutWaterShimmer {
            0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { transform: translateX(250%) skewX(-20deg); opacity: 0; }
        }

        body.liquid-glass-theme .w-full.h-\[60px\]::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100px; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: aboutWaterShimmer 6s infinite ease-in-out;
        }

        body.liquid-glass-theme .w-full.h-\[60px\] h1,
        body.liquid-glass-theme .w-full.h-\[60px\] svg {
            color: #111111 !important;
            position: relative;
            z-index: 2;
        }

        body.liquid-glass-theme .flex-1.overflow-y-auto {
            background-color: transparent !important;
        }

        body.liquid-glass-theme .about-card {
            background: rgba(255, 255, 255, 0.28) !important;
            backdrop-filter: blur(35px) brightness(1.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 15px 45px -12px rgba(0, 0, 0, 0.1) !important;
        }

        body.liquid-glass-theme .about-link {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5) !important;
            color: #111111 !important;
        }

            color: #111111 !important;
        }

            border: 1px solid rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05) !important;
            color: #111111 !important;
        }

        body.liquid-glass-theme .share-button span,

            color: #111111 !important;
        }

        body.gray-theme {
            --bg-color: #202225;
            --bg-third: #292B2F;
            --text-color: #E0E0E0;
            --muted-text: #B0B6C1;

    <script>
        document.addEventListener('DOMContentLoaded', initTheme);
        // Navigation State Management
        function goBack() {
            const previousPage = localStorage.getItem('previousPage');
            if (previousPage) {
                window.location.href = previousPage;
            } else {
                // Fallback to home if no previous page is stored
                window.location.href = 'home.html';
            }
        }

        // Trigger manual tutorial
        window.triggerTutorial = function(page) {
            const flagName = page.includes('services') ? 'forceServicesTutorial' : 'forceHistoryTutorial';
            localStorage.setItem(flagName, 'true');
            window.location.href = page;
        }

        async function shareApp() {
            const shareData = {
                title: 'Phluowise',
                text: 'Download Phluowise - Your water delivery companion! Get the Android app natively here:',
                url: 'https://phluowise.com/app.apk'
            };
            const shareString = `${shareData.title}\n${shareData.text}\n${shareData.url}`;

            try {
                // Try common Android Webview Javascript Interfaces first
                if (window.AndroidInterface && typeof window.AndroidInterface.share === 'function') {
                    window.AndroidInterface.share(shareString);
                    return;
                } else if (window.Android && typeof window.Android.share === 'function') {
                    window.Android.share(shareString);
                    return;
                } else if (window.Android && typeof window.Android.shareText === 'function') {
                    window.Android.shareText(shareString);
                    return;
                }

                // Try Capacitor Share (for native Android/iOS Capacitor wraps)
                if (window.Capacitor && window.Capacitor.isPluginAvailable('Share')) {
                    await Capacitor.Plugins.Share.share({
                        title: shareData.title,
                        text: shareData.text,
                        url: shareData.url,
                        dialogTitle: 'Share Phluowise'
                    });
                } 
                // Fallback to Web Share API (Modern mobile browsers and supported WebViews)
                else if (navigator.share) {
                    await navigator.share(shareData);
                } 
                // Final fallback for missing APIs: try native Intent on Android, otherwise clipboard
                else {
                    const isAndroid = /android/i.test(navigator.userAgent);
                    if (isAndroid) {
                        const intentUrl = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${encodeURIComponent(shareString)};S.android.intent.extra.SUBJECT=${encodeURIComponent(shareData.title)};end`;
                        window.location.href = intentUrl;
                    } else {
                        try {
                            await navigator.clipboard.writeText(shareString);
                            alert('Info copied to clipboard! You can paste it anywhere to share.');
                        } catch (e) {
                            alert('Sharing APIs not available on this device.');
                        }
                    }
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    // One final attempt with Intent in case navigator.share existed but failed silently
                    const isAndroid = /android/i.test(navigator.userAgent);
                    if (isAndroid) {
                        try {
                            const intentUrl = `intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.android.intent.extra.TEXT=${encodeURIComponent(shareString)};S.android.intent.extra.SUBJECT=${encodeURIComponent(shareData.title)};end`;
                            window.location.href = intentUrl;
                        } catch (intentErr) {
                            alert('Sharing failed. Please try again later.');
                        }
                    } else {
                        alert('Sharing failed. Please try again later.');
                    }
                }
            }
        }
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New content is available
                                    if (confirm('New version available! Reload to update?')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                    });
            });
        }
