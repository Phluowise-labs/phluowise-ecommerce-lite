    <style>
        /* =========================================
           BASE
        ========================================= */
        html,
        body {
            height: 100vh;
            overflow: hidden;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* =========================================
           ROOT / DESIGN TOKENS
        ========================================= */
        :root,
        body.dark-theme {
            --primary: #007ACC;
            --primary-glow: rgba(0, 122, 204, 0.45);
            --primary-subtle: rgba(0, 122, 204, 0.12);
            --bg-base: #060606;
            --glass-bg: rgba(28, 32, 40, 0.60);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-hover: rgba(0, 122, 204, 0.08);
            --glass-row-sep: rgba(255, 255, 255, 0.06);
            --header-glass: rgba(50, 55, 67, 0.65);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --text-label: rgba(255, 255, 255, 0.88);
            --radio-idle: rgba(120, 130, 150, 0.55);
            --bottom-fade-dense: rgba(6, 6, 6, 0.98);
            --bottom-fade-light: rgba(6, 6, 6, 0.60);
            --toast-bg: rgba(20, 24, 32, 0.72);
            --radius-card: 20px;
            --radius-pill: 30px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body.gray-theme {
            --primary: #007ACC;
            --primary-glow: rgba(0, 122, 204, 0.45);
            --primary-subtle: rgba(0, 122, 204, 0.12);
            --bg-base: #202225;
            --glass-bg: rgba(41, 43, 47, 0.60);
            /* glassified #292B2F */
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-hover: rgba(0, 122, 204, 0.08);
            --glass-row-sep: rgba(255, 255, 255, 0.06);
            --header-glass: rgba(54, 57, 63, 0.65);
            /* glassified #36393f */
            --bottom-fade-dense: rgba(32, 34, 37, 0.98);
            --bottom-fade-light: rgba(32, 34, 37, 0.60);
            --toast-bg: rgba(41, 43, 47, 0.95);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --text-label: rgba(255, 255, 255, 0.88);
            --radio-idle: rgba(120, 130, 150, 0.55);
            --radius-card: 20px;
            --radius-pill: 30px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }


        body {
            font-family: var(--font);
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            /* Subtle ambient glow for depth */
            background-image:
                radial-gradient(ellipse 80% 45% at 50% -10%, rgba(0, 122, 204, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 30% at 80% 110%, rgba(59, 116, 255, 0.10) 0%, transparent 60%);
        }

        /* =========================================
           PAGE WRAPPER
        ========================================= */
        .page-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 18px 120px 18px;
            position: relative;
        }

        /* =========================================
           HEADER — logo centred, back btn absolute
        ========================================= */
        .header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0 12px 0;
            min-height: 60px;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.75);
            transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .back-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .brand-logo {
            display: block;
            width: 160px;
            height: auto;
        }

        /* =========================================
           HERO SECTION
        ========================================= */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 22px 0 30px 0;
            animation: fadeInUp 0.5s ease both;
        }

        .hero-heading {
            font-size: 23px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .hero-sub {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* =========================================
           GLASSMORPHISM CARD
        ========================================= */
        .glass-card {
            width: 100%;
            border-radius: var(--radius-card);
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
            /* Core glassmorphism properties */
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.45),
                0 1px 0 rgba(255, 255, 255, 0.06) inset,
                0 0 0 0.5px rgba(255, 255, 255, 0.04) inset;
            animation: fadeInUp 0.5s ease 0.1s both;
        }

        /* =========================================
           "SELECT TO CONTINUE" HEADER ROW
        ========================================= */
        .select-header {
            position: sticky;
            top: 0;
            z-index: 5;
            background: var(--header-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 20px;
            text-align: center;
            font-size: 14.5px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.80);
            letter-spacing: 0.2px;
            border-bottom: 1px solid var(--glass-row-sep);
        }

        /* =========================================
           OPTION ROW
        ========================================= */
        .option-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.12s ease;
            background: transparent;
            border: none;
            width: 100%;
            border-bottom: 1px solid var(--glass-row-sep);
            text-align: left;
            position: relative;
            outline: none;
        }

        .option-row:last-child {
            border-bottom: none;
        }

        .option-row:hover {
            background: var(--glass-hover);
        }

        .option-row:focus-visible {
            background: var(--glass-hover);
            box-shadow: inset 0 0 0 2px rgba(0, 122, 204, 0.5);
        }

        .option-row:active {
            background: rgba(0, 122, 204, 0.14);
            transform: scale(0.99);
        }

        .option-label {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-label);
            user-select: none;
            pointer-events: none;
        }

        /* =========================================
           CUSTOM RADIO — glassmorphism style
        ========================================= */
        .radio-outer {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--radio-idle);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            /* Glass idle state */
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition:
                border-color 0.22s ease,
                background 0.22s ease,
                box-shadow 0.22s ease;
            pointer-events: none;
        }

        .radio-inner {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: transparent;
            transition:
                background 0.22s ease,
                transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0);
        }

        /* Selected state */
        .option-row.selected .radio-outer {
            border-color: var(--primary);
            background: rgba(0, 122, 204, 0.15);
            box-shadow: 0 0 10px rgba(0, 122, 204, 0.40);
        }

        .option-row.selected .radio-inner {
            background: var(--primary);
            transform: scale(1);
        }

        /* Selected row — subtle left accent line */
        .option-row.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: linear-gradient(180deg, #3B74FF, #007ACC);
            opacity: 0.9;
        }

        /* Visually hidden real checkboxes */
        .option-row input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            pointer-events: none;
        }

        /* =========================================
           FIXED SUBMIT BUTTON BAR
        ========================================= */
        .submit-btn-wrapper {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: center;
            padding: 14px 18px 30px 18px;
            /* Glass bottom bar */
            background: linear-gradient(to top, var(--bottom-fade-dense) 55%, var(--bottom-fade-light) 85%, transparent 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 10;
        }

        .submit-btn {
            width: 100%;
            height: 56px;
            border-radius: var(--radius-pill);
            /* Rich glass-blue gradient */
            background: linear-gradient(135deg,
                    rgba(0, 90, 160, 0.9) 0%,
                    rgba(0, 122, 204, 0.95) 45%,
                    rgba(59, 116, 255, 0.9) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 170, 255, 0.35);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow:
                0 4px 28px rgba(0, 122, 204, 0.45),
                0 1px 8px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
            transition:
                transform 0.15s ease,
                box-shadow 0.15s ease,
                opacity 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            box-shadow:
                0 6px 36px rgba(0, 122, 204, 0.60),
                0 2px 10px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.97);
            box-shadow:
                0 2px 14px rgba(0, 122, 204, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .submit-btn:disabled {
            opacity: 0.50;
            cursor: not-allowed;
        }

        /* =========================================
           BUTTON SPINNER
        ========================================= */
        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.28);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .btn-spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* =========================================
           TOAST NOTIFICATION
        ========================================= */
        .toast {
            position: fixed;
            bottom: 104px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            /* Glassmorphism toast */
            background: var(--toast-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            color: var(--text-primary);
            padding: 13px 22px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.50),
                0 1px 0 rgba(255, 255, 255, 0.06) inset;
            font-size: 14.5px;
            font-weight: 500;
            font-family: var(--font);
            z-index: 9999;
            transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            max-width: calc(100vw - 40px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: rgba(0, 122, 204, 0.45);
            background: rgba(0, 90, 160, 0.50);
        }

        .toast.error {
            border-color: rgba(255, 70, 70, 0.45);
            background: rgba(120, 20, 20, 0.55);
        }

        /* =========================================
           ANIMATIONS
        ========================================= */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* =========================================
           RESPONSIVE — 360px
        ========================================= */
        @media screen and (max-width: 360px) {
            .brand-title {
                font-size: 24px;
            }

            .hero-heading {
                font-size: 19px;
            }

            .hero-sub {
                font-size: 13px;
            }

            .option-label {
                font-size: 14px;
            }

            .option-row {
                padding: 14px 14px;
            }

            .select-header {
                font-size: 13.5px;
                padding: 12px 14px;
            }

            .submit-btn {
                height: 50px;
                font-size: 15px;
            }
        }
    </style>
</head>

        <!-- ===== HERO ===== -->
        <section class="hero" aria-labelledby="pageTitle">
            <h1 class="hero-heading" id="pageTitle">Let Get You Started!</h1>
            <p class="hero-sub">How Did You Hear About Us?</p>
        </section>

        <!-- ===== OPTIONS (submitted via JS fetch — no native form action) ===== -->
        <div class="glass-card" role="group" aria-label="How did you hear about us? Select all that apply.">

            <!-- Header row -->
            <div class="select-header" aria-hidden="true">Select to Continue</div>

            <!-- Options rendered from JS to prevent tampering with data-value -->
        </div><!-- /glass-card -->

        <!-- ===== FIXED SUBMIT BUTTON ===== -->
        <div class="submit-btn-wrapper">
            <button class="submit-btn" id="submitBtn" type="button" onclick="handleSubmit()">
                <span class="btn-text">We Are Ready To Go!</span>
                <div class="btn-spinner" aria-hidden="true"></div>
            </button>
        </div>

    </div><!-- /page-wrapper -->

    <!-- TOAST -->
    <div id="toast" class="toast" role="alert" aria-live="polite"></div>

    <!-- Scripts -->
    <script src="js/pwa-update.js?v=7"></script>
    <script src="js/theme.js"></script>

    <script>
        'use strict';

        /* =========================================
           SECURITY: allowlisted options only.
           Values never come from user input —
           they are defined here and rendered safely
           with textContent (not innerHTML).
        ========================================= */
        const ALLOWED_OPTIONS = Object.freeze([
            'Social Media',
            'Advertisements',
            'Peer to Peer',
            'Recomendation',
            'Youtube',
            'Website',
            'Blog',
            'Magazine',
            'Whatsapp Community',
            'TikTok'
        ]);

        /* Formspark endpoint (correct service) */
        const FORMSPARK_URL = 'https://submit-form.com/Ku6fylrEK';

        /* Anti-spam: track last submission time */
        let lastSubmitTime = 0;
        const RATE_LIMIT_MS = 10000; // 10 s cool-down
        let isSubmitting = false;

        /* =========================================
           RENDER OPTIONS SAFELY (no innerHTML for content)
        ========================================= */
        (function renderOptions() {
            const container = document.querySelector('.glass-card');

            ALLOWED_OPTIONS.forEach(function (value) {
                const row = document.createElement('div');
                row.className = 'option-row';
                row.setAttribute('role', 'checkbox');
                row.setAttribute('tabindex', '0');
                row.setAttribute('aria-checked', 'false');
                row.setAttribute('data-value', value); // safe: from our own const

                // Label span — set via textContent, never innerHTML
                const label = document.createElement('span');
                label.className = 'option-label';
                label.textContent = value; // XSS-safe

                // Radio visual
                const radioOuter = document.createElement('div');
                radioOuter.className = 'radio-outer';
                radioOuter.setAttribute('aria-hidden', 'true');
                const radioInner = document.createElement('div');
                radioInner.className = 'radio-inner';
                radioOuter.appendChild(radioInner);

                row.appendChild(label);
                row.appendChild(radioOuter);

                // Events
                row.addEventListener('click', function () { toggleOption(row); });
                row.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        toggleOption(row);
                    }
                });

                container.appendChild(row);
            });
        })();

        /* =========================================
           TOGGLE SELECTION
        ========================================= */
        function toggleOption(row) {
            const isSelected = row.classList.contains('selected');
            if (isSelected) {
                row.classList.remove('selected');
                row.setAttribute('aria-checked', 'false');
            } else {
                row.classList.add('selected');
                row.setAttribute('aria-checked', 'true');
            }
        }

        /* =========================================
           COLLECT SELECTED VALUES — validated
           against allowlist before sending
        ========================================= */
        function getSelectedValues() {
            const rows = document.querySelectorAll('.option-row.selected');
            return Array.from(rows)
                .map(function (r) { return r.getAttribute('data-value'); })
                .filter(function (v) { return ALLOWED_OPTIONS.includes(v); }); // allowlist gate
        }

        /* =========================================
           SUBMIT — Formspark via fetch
        ========================================= */
        function handleSubmit() {
            /* Double-submit guard */
            if (isSubmitting) return;

            /* Rate-limit guard */
            const now = Date.now();
            if (now - lastSubmitTime < RATE_LIMIT_MS) {
                const remaining = Math.ceil((RATE_LIMIT_MS - (now - lastSubmitTime)) / 1000);
                showToast('Please wait ' + remaining + 's before retrying.', 'error');
                return;
            }

            const selected = getSelectedValues();
            if (selected.length === 0) {
                showToast('Please select at least one option.', 'error');
                return;
            }

            isSubmitting = true;
            lastSubmitTime = now;

            const btn = document.getElementById('submitBtn');
            btn.classList.add('loading');
            btn.disabled = true;

            /* Build payload — only allowlisted, sanitised values */
            const payload = {
                _subject: 'Phluowise Survey: How Did You Hear About Us?',
                selected_sources: selected.join(', '),
                source_count: selected.length,
                page: 'phluowise-onboarding'
            };

            fetch(FORMSPARK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            })
                .then(function (response) {
                    isSubmitting = false;
                    btn.classList.remove('loading');
                    btn.disabled = false;

                    if (response.ok) {
                        showToast('Thank you! All set 🎉', 'success');
                        setTimeout(function () {
                            window.location.href = 'home.html';
                        }, 1800);
                    } else {
                        showToast('Submission failed. Please try again.', 'error');
                        lastSubmitTime = 0; // allow immediate retry on server error
                    }
                })
                .catch(function () {
                    isSubmitting = false;
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    showToast('Network error. Check your connection.', 'error');
                    lastSubmitTime = 0;
                });
        }

        /* =========================================
           TOAST — uses textContent (XSS-safe)
        ========================================= */
        var toastTimer = null;

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message; // safe — never innerHTML
            toast.className = 'toast ' + (type || '');
            void toast.offsetWidth; // reflow to restart transition
            toast.classList.add('show');

            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function () {
                toast.classList.remove('show');
            }, 3400);
        }
    </script>
